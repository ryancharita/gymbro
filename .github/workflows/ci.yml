name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: ironlink
          POSTGRES_PASSWORD: ironlink
          POSTGRES_DB: ironlink
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ironlink -d ironlink"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ironlink:ironlink@localhost:5432/ironlink?schema=public
      REDIS_URL: redis://localhost:6379
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      CLERK_WEBHOOK_SECRET: whsec_ci_placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run database migrations
        run: npm run db:migrate:deploy -w @ironlink/db

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build -- --filter=@ironlink/*
