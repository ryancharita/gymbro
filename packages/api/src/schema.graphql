scalar DateTime

enum SplitDifficulty {
  BEGINNER
  INTERMEDIATE
  ADVANCED
}

enum SplitVisibility {
  PUBLIC
  FRIENDS_ONLY
  PRIVATE
}

enum SplitStatus {
  DRAFT
  PUBLISHED
}

enum SetType {
  STRAIGHT
  SUPERSET
  DROP_SET
  AMRAP
  TIME_BASED
}

enum SessionStatus {
  IN_PROGRESS
  COMPLETED
  ABANDONED
}

type User {
  id: ID!
  username: String
  bio: String
  profilePhotoUrl: String
  city: String
  gymName: String
  experienceLevel: String
  trainingStyleTags: [String!]!
  goals: [String!]!
  onboardingComplete: Boolean!
  isPrivateProfile: Boolean!
  notifyOnFollow: Boolean!
  notifyOnLike: Boolean!
  notifyOnComment: Boolean!
  notifyWeeklySummary: Boolean!
  optOutBuddyFinder: Boolean!
  createdAt: DateTime!
}

type UserStats {
  totalWorkouts: Int!
  followersCount: Int!
  followingCount: Int!
  currentStreakDays: Int!
}

type UserProfile {
  user: User!
  stats: UserStats!
  sharedSplits: [Split!]!
  sharedRoutines: [Routine!]!
  progressPosts: [Post!]!
  isFollowing: Boolean!
  isRequested: Boolean!
}

type Exercise {
  id: ID!
  name: String!
  description: String
  primaryMuscles: [String!]!
  secondaryMuscles: [String!]!
  equipment: [String!]!
  movementPattern: String
  videoUrl: String
  isCustom: Boolean!
}

type ExercisePage {
  items: [Exercise!]!
  totalCount: Int!
}

input CreateCustomExerciseInput {
  name: String!
  description: String
  primaryMuscles: [String!]!
  secondaryMuscles: [String!]!
  equipment: [String!]!
  movementPattern: String
  videoUrl: String
}

type Split {
  id: ID!
  name: String!
  description: String
  daysPerWeek: Int!
  difficulty: SplitDifficulty!
  experienceLevel: String
  visibility: SplitVisibility!
  status: SplitStatus!
  days: [SplitDay!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SplitDay {
  id: ID!
  label: String!
  dayOrder: Int!
  routineId: ID
  routine: Routine
}

type Routine {
  id: ID!
  name: String!
  notes: String
  exercises: [RoutineExercise!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type RoutineExercise {
  id: ID!
  exerciseId: ID!
  exercise: Exercise!
  setType: SetType!
  sets: Int!
  repsMin: Int
  repsMax: Int
  weightTarget: Float
  restSeconds: Int
  notes: String
  sortOrder: Int!
}

type WorkoutSession {
  id: ID!
  routineId: ID
  routine: Routine
  status: SessionStatus!
  startedAt: DateTime!
  completedAt: DateTime
  notes: String
  durationSeconds: Int!
  totalVolumeKg: Float!
  sets: [WorkoutSet!]!
}

type WorkoutSet {
  id: ID!
  exerciseId: ID!
  exercise: Exercise!
  setNumber: Int!
  setType: SetType!
  weight: Float
  reps: Int
  durationSec: Int
  notes: String
  isCompleted: Boolean!
  isPr: Boolean!
  createdAt: DateTime!
}

type Post {
  id: ID!
  userId: ID!
  user: User!
  content: String!
  imageUrl: String
  splitId: ID
  routineId: ID
  workoutSessionId: ID
  likeCount: Int!
  commentCount: Int!
  viewerHasLiked: Boolean!
  comments: [PostComment!]!
  createdAt: DateTime!
}

type PostComment {
  id: ID!
  postId: ID!
  userId: ID!
  user: User!
  content: String!
  createdAt: DateTime!
}

enum ProgressPeriod {
  WEEKLY
  MONTHLY
}

type VolumeTrendPoint {
  date: String!
  value: Float!
}

type MuscleGroupVolumePoint {
  muscleGroup: String!
  value: Float!
}

type ProgressOverview {
  sessionVolumeTrend: [VolumeTrendPoint!]!
  muscleGroupVolumeTrend: [MuscleGroupVolumePoint!]!
  totalSessions: Int!
  totalPrs: Int!
}

type ExerciseProgressPoint {
  date: String!
  weight: Float
  reps: Int
  oneRepMaxEstimate: Float!
  isPr: Boolean!
}

type ExerciseProgressHistory {
  exerciseId: ID!
  points: [ExerciseProgressPoint!]!
}

input SplitDayInput {
  label: String!
}

input CreateSplitInput {
  name: String!
  description: String
  daysPerWeek: Int!
  difficulty: SplitDifficulty!
  experienceLevel: String
  visibility: SplitVisibility
  status: SplitStatus
  days: [SplitDayInput!]
}

input UpdateSplitInput {
  name: String
  description: String
  daysPerWeek: Int
  difficulty: SplitDifficulty
  experienceLevel: String
  visibility: SplitVisibility
  status: SplitStatus
  days: [SplitDayInput!]
}

input RoutineExerciseInput {
  exerciseId: ID!
  setType: SetType!
  sets: Int!
  repsMin: Int
  repsMax: Int
  weightTarget: Float
  restSeconds: Int
  notes: String
}

input CreateRoutineInput {
  name: String!
  notes: String
  exercises: [RoutineExerciseInput!]!
}

input UpdateRoutineInput {
  name: String
  notes: String
  exercises: [RoutineExerciseInput!]
}

input LogWorkoutSetInput {
  setId: ID!
  weight: Float
  reps: Int
  durationSec: Int
  notes: String
  isCompleted: Boolean
}

input CreatePostInput {
  content: String!
  imageUrl: String
  splitId: ID
  routineId: ID
  workoutSessionId: ID
}

input CompleteOnboardingInput {
  username: String!
  bio: String
  profilePhotoUrl: String
  gymName: String
  experienceLevel: String!
  trainingStyleTags: [String!]!
  goals: [String!]!
}

input UpdateProfileInput {
  username: String
  bio: String
  profilePhotoUrl: String
  gymName: String
  city: String
}

input UpdatePreferencesInput {
  isPrivateProfile: Boolean
  notifyOnFollow: Boolean
  notifyOnLike: Boolean
  notifyOnComment: Boolean
  notifyWeeklySummary: Boolean
  optOutBuddyFinder: Boolean
}

type Query {
  health: String!
  me: User
  isUsernameAvailable(username: String!): Boolean!
  exercises(search: String, muscleGroup: String, equipment: String, limit: Int = 50, offset: Int = 0): ExercisePage!
  exerciseEquipmentOptions: [String!]!
  mySplits: [Split!]!
  split(id: ID!): Split
  myRoutines: [Routine!]!
  routine(id: ID!): Routine
  myWorkoutSessions(limit: Int = 20, offset: Int = 0): [WorkoutSession!]!
  workoutSession(id: ID!): WorkoutSession
  activeWorkoutSession: WorkoutSession
  progressOverview(period: ProgressPeriod = WEEKLY): ProgressOverview!
  exerciseProgress(exerciseId: ID!, limit: Int = 30): ExerciseProgressHistory!
  profile(userId: ID!): UserProfile
  myFollowers: [User!]!
  myFollowing: [User!]!
  discoverUsers(search: String, limit: Int = 20, offset: Int = 0): [User!]!
  homeFeed(limit: Int = 30, offset: Int = 0): [Post!]!
}

type Mutation {
  completeOnboarding(input: CompleteOnboardingInput!): User!
  updateProfile(input: UpdateProfileInput!): User!
  updatePreferences(input: UpdatePreferencesInput!): User!
  deleteAccount: Boolean!
  createCustomExercise(input: CreateCustomExerciseInput!): Exercise!
  createSplit(input: CreateSplitInput!): Split!
  updateSplit(id: ID!, input: UpdateSplitInput!): Split!
  deleteSplit(id: ID!): Boolean!
  duplicateSplit(id: ID!): Split!
  createRoutine(input: CreateRoutineInput!): Routine!
  updateRoutine(id: ID!, input: UpdateRoutineInput!): Routine!
  deleteRoutine(id: ID!): Boolean!
  assignRoutineToSplitDay(splitDayId: ID!, routineId: ID): SplitDay!
  startWorkoutSession(routineId: ID!): WorkoutSession!
  logWorkoutSet(input: LogWorkoutSetInput!): WorkoutSet!
  completeWorkoutSession(id: ID!, notes: String): WorkoutSession!
  abandonWorkoutSession(id: ID!, notes: String): WorkoutSession!
  followUser(userId: ID!): Boolean!
  unfollowUser(userId: ID!): Boolean!
  createPost(input: CreatePostInput!): Post!
  likePost(postId: ID!): Boolean!
  unlikePost(postId: ID!): Boolean!
  addPostComment(postId: ID!, content: String!): PostComment!
}
